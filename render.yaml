# Exported from Render on 2026-05-20T19:27:53Z
version: "1"
projects:
- name: Usecase Detector
  environments:
  - name: Production
    services:
    - type: web
      previews:
        generation: automatic
      name: workflow-keyword-detector
      runtime: python
      plan: starter
      envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: Workflowsdb
          property: connectionString
      # Needed for the dashboard to trigger crawls on the workflow service.
      - key: RENDER_API_KEY
        sync: false
      - key: WORKFLOW_SLUG
        sync: false
      region: oregon
      buildCommand: pip install -r requirements.txt
      startCommand: gunicorn app:app
      autoDeployTrigger: commit
      rootDir: dashboard
    databases:
    - name: Workflowsdb
      databaseName: workflowsdb
      user: workflowsdb_user
      plan: basic-256mb
      region: oregon
      postgresMajorVersion: "18"
      diskSizeGB: 1
