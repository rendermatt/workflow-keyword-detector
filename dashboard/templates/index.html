<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Keyword Scraper Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #23263a;
      --border: #2e3148;
      --accent: #6c63ff;
      --accent2: #00d4aa;
      --text: #e2e8f0;
      --muted: #8891aa;
      --hit: #6c63ff;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      line-height: 1.5;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 32px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header h1 { font-size: 18px; font-weight: 600; }
    header span { color: var(--muted); font-size: 13px; }
    header nav { display: flex; gap: 4px; margin-left: auto; }
    header nav a {
      color: var(--muted);
      text-decoration: none;
      font-size: 13px;
      padding: 6px 12px;
      border-radius: 8px;
    }
    header nav a:hover { color: var(--text); background: var(--surface2); }
    header nav a.active { color: var(--text); background: var(--surface2); }
    .feature-select { display: flex; align-items: center; gap: 8px; }
    .feature-select label {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .04em;
    }
    .feature-select select {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: inherit;
      font-size: 13px;
      padding: 7px 12px;
      cursor: pointer;
    }
    .feature-select select:focus { outline: none; border-color: var(--accent); }

    .container { max-width: 1400px; margin: 0 auto; padding: 24px 32px; }

    /* Summary cards */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px 24px;
    }
    .card-label { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 6px; }
    .card-value { font-size: 28px; font-weight: 700; color: var(--accent); }
    .card-value.card-value-sm { font-size: 17px; font-weight: 600; }

    /* Section */
    .section-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-title .badge {
      font-size: 11px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 99px;
      padding: 2px 10px;
      color: var(--muted);
      font-weight: 400;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 28px;
    }
    @media (max-width: 900px) { .grid-2 { grid-template-columns: 1fr; } }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px 24px;
    }

    .chart-wrap { position: relative; }
    .chart-wrap canvas { max-height: 380px; }

    /* Heatmap */
    .heatmap-scroll { overflow-x: auto; margin-top: 8px; }
    table.heatmap {
      border-collapse: collapse;
      font-size: 12px;
      white-space: nowrap;
    }
    table.heatmap th {
      padding: 4px 10px;
      color: var(--muted);
      font-weight: 500;
      text-align: left;
      position: sticky;
      top: 0;
      background: var(--surface);
    }
    table.heatmap th.col-head {
      writing-mode: vertical-rl;
      transform: rotate(180deg);
      padding: 10px 4px;
      max-width: 28px;
      text-align: left;
    }
    table.heatmap td {
      padding: 4px 10px;
      border: 1px solid var(--border);
    }
    table.heatmap td.url-cell {
      font-size: 12px;
      color: var(--muted);
      max-width: 240px;
      overflow: hidden;
      text-overflow: ellipsis;
      position: sticky;
      left: 0;
      background: var(--surface);
      z-index: 1;
    }
    table.heatmap td.count-cell {
      text-align: center;
      min-width: 28px;
      font-weight: 600;
    }

    /* Run comparison */
    .runs-full { margin-bottom: 28px; }

    /* Loading / empty */
    .loading {
      color: var(--muted);
      text-align: center;
      padding: 40px;
      font-size: 13px;
    }

    /* Runs list */
    .runs-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .runs-table th {
      text-align: left;
      padding: 8px 12px;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      font-weight: 500;
    }
    .runs-table td { padding: 8px 12px; border-bottom: 1px solid var(--border); }
    .runs-table tr:last-child td { border-bottom: none; }
    .pill {
      display: inline-block;
      background: var(--surface2);
      border-radius: 99px;
      padding: 2px 10px;
      font-size: 11px;
      color: var(--accent2);
      font-family: monospace;
    }

    /* Coverage table */
    .cov-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .cov-table th {
      text-align: left;
      padding: 8px 12px;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      font-weight: 500;
    }
    .cov-table th.num, .cov-table td.num { text-align: right; font-variant-numeric: tabular-nums; }
    .cov-table td { padding: 8px 12px; border-bottom: 1px solid var(--border); }
    .cov-table tr:last-child td { border-bottom: none; }
    .cov-table tbody tr { cursor: pointer; }
    .cov-table tbody tr:hover { background: var(--surface2); }
    .cov-domain { color: var(--text); font-weight: 500; }
    .cov-bar-wrap { display: flex; align-items: center; gap: 10px; }
    .cov-bar {
      height: 6px;
      border-radius: 99px;
      background: var(--accent);
      min-width: 2px;
    }
    .cov-caption { color: var(--muted); font-size: 12px; margin-top: 12px; }

    /* Modal */
    .modal-backdrop {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.6);
      display: none;
      align-items: flex-start;
      justify-content: center;
      padding: 48px 20px;
      overflow-y: auto;
      z-index: 50;
    }
    .modal-backdrop.open { display: flex; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      width: 100%;
      max-width: 820px;
      padding: 22px 24px;
    }
    .modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; gap: 12px; }
    .modal-head h2 { font-size: 17px; font-weight: 600; }
    .modal-close {
      background: transparent; border: 1px solid var(--border); color: var(--text);
      border-radius: 8px; padding: 6px 12px; cursor: pointer; font-size: 13px;
    }
    .modal-close:hover { background: var(--surface2); }
    .modal-sub { color: var(--muted); font-size: 13px; margin-bottom: 16px; }
    .modal-body { max-height: 60vh; overflow-y: auto; }
    .host-group { margin-bottom: 18px; }
    .host-group:last-child { margin-bottom: 0; }
    .host-title {
      font-size: 13px; font-weight: 600; color: var(--accent2);
      margin-bottom: 6px; word-break: break-all;
    }
    table.pages { width: 100%; border-collapse: collapse; font-size: 12.5px; }
    table.pages th {
      text-align: left; padding: 6px 10px; color: var(--muted); font-weight: 500;
      border-bottom: 1px solid var(--border); white-space: nowrap;
    }
    table.pages th.num, table.pages td.num { text-align: right; font-variant-numeric: tabular-nums; }
    table.pages td { padding: 6px 10px; border-bottom: 1px solid var(--border); vertical-align: top; }
    table.pages tr:last-child td { border-bottom: none; }
    table.pages a { color: var(--text); text-decoration: none; word-break: break-all; }
    table.pages a:hover { color: var(--accent2); text-decoration: underline; }
    .status-ok { color: var(--accent2); }
    .status-err { color: #ff6384; }
  </style>
</head>
<body>

<header>
  <svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
    <path stroke-linecap="round" stroke-linejoin="round"
      d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
  </svg>
  <h1>Keyword Scraper</h1>
  <span>Workflow &amp; AI keyword detection dashboard</span>
  <nav>
    <a href="/" class="active">Dashboard</a>
    <a href="/features">Features</a>
    <a href="/docs">Docs</a>
  </nav>
  <div class="feature-select">
    <label for="feature-filter">Feature</label>
    <select id="feature-filter">
      <option value="">All features</option>
    </select>
  </div>
</header>

<div class="container">

  <!-- Summary cards -->
  <div class="cards" id="cards">
    <div class="card"><div class="card-label">Domains</div><div class="card-value" id="c-domains">—</div></div>
    <div class="card"><div class="card-label">Pages Crawled</div><div class="card-value" id="c-pages">—</div></div>
    <div class="card"><div class="card-label">Total Hits</div><div class="card-value" id="c-hits">—</div></div>
    <div class="card"><div class="card-label">Last Run</div><div class="card-value card-value-sm" id="c-lastrun">—</div></div>
  </div>

  <!-- Crawl coverage -->
  <div class="panel" style="margin-bottom:28px">
    <div class="section-title">Crawl Coverage <span class="badge">pages crawled per domain</span></div>
    <div id="coverage-container"><div class="loading">Loading…</div></div>
  </div>

  <!-- Top Keywords + Top URLs -->
  <div class="grid-2">
    <div class="panel">
      <div class="section-title">Top Keywords <span class="badge">by total hits</span></div>
      <div class="chart-wrap"><canvas id="chart-keywords"></canvas></div>
    </div>
    <div class="panel">
      <div class="section-title">Top URLs <span class="badge">by total hits</span></div>
      <div class="chart-wrap"><canvas id="chart-urls"></canvas></div>
    </div>
  </div>

  <!-- Heatmap -->
  <div class="panel" style="margin-bottom:28px">
    <div class="section-title">URL × Keyword Heatmap <span class="badge">only hits &gt; 0</span></div>
    <div class="heatmap-scroll" id="heatmap-container">
      <div class="loading">Loading…</div>
    </div>
  </div>

</div>

<!-- Domain detail modal -->
<div class="modal-backdrop" id="domain-modal">
  <div class="modal">
    <div class="modal-head">
      <h2 id="dm-title">Domain</h2>
      <button class="modal-close" onclick="closeDomainModal()">Close</button>
    </div>
    <div class="modal-sub" id="dm-sub"></div>
    <div class="modal-body" id="dm-body"><div class="loading">Loading…</div></div>
  </div>
</div>

<script>
const PALETTE = [
  '#6c63ff','#00d4aa','#ff6384','#ffcd56','#36a2eb','#ff9f40',
  '#4bc0c0','#9966ff','#ff6384','#c9cbcf',
];

function hsl(value, max) {
  if (value === 0) return 'transparent';
  const t = Math.min(value / max, 1);
  const h = 260 - t * 60; // purple → blue-green as intensity rises
  const s = 60 + t * 30;
  const l = 20 + t * 35;
  return `hsl(${h}, ${s}%, ${l}%)`;
}

// Selected feature filter, appended to every API request.
function featureQuery() {
  const id = document.getElementById('feature-filter').value;
  return id ? `?feature_id=${encodeURIComponent(id)}` : '';
}

// Track live Chart.js instances so we can tear them down before redrawing.
const charts = {};
function drawChart(key, canvasId, config) {
  if (charts[key]) charts[key].destroy();
  charts[key] = new Chart(document.getElementById(canvasId), config);
}

// Populate the feature dropdown once on startup.
async function loadFeatureOptions() {
  try {
    const features = await fetch('/api/features').then(r => r.json());
    const sel = document.getElementById('feature-filter');
    features.forEach(f => {
      const opt = document.createElement('option');
      opt.value = f.id;
      opt.textContent = f.name;
      sel.appendChild(opt);
    });
  } catch (err) {
    console.error('Failed to load feature options:', err);
  }
}

async function load() {
  const q = featureQuery();
  const [summary, keywords, urls, heatmap] = await Promise.all([
    fetch('/api/summary' + q).then(r => r.json()),
    fetch('/api/keywords' + q).then(r => r.json()),
    fetch('/api/urls' + q).then(r => r.json()),
    fetch('/api/heatmap' + q).then(r => r.json()),
  ]);

  // Summary cards
  document.getElementById('c-domains').textContent = summary.total_domains;
  document.getElementById('c-pages').textContent = summary.pages_crawled;
  document.getElementById('c-hits').textContent = summary.total_hits;
  document.getElementById('c-lastrun').textContent =
    summary.last_run_at ? new Date(summary.last_run_at).toLocaleString() : 'No runs yet';

  // Keywords chart (horizontal bar, top 20 with hits then top without)
  const kwTop = keywords.filter(k => k.total > 0).slice(0, 20);
  if (kwTop.length === 0) {
    // Show all, even zeros
    keywords.slice(0, 20).forEach(k => kwTop.push(k));
  }
  drawChart('keywords', 'chart-keywords', {
    type: 'bar',
    data: {
      labels: kwTop.map(k => k.keyword),
      datasets: [{
        label: 'Total hits',
        data: kwTop.map(k => k.total),
        backgroundColor: kwTop.map((_, i) => PALETTE[i % PALETTE.length] + 'cc'),
        borderColor: kwTop.map((_, i) => PALETTE[i % PALETTE.length]),
        borderWidth: 1,
        borderRadius: 4,
      }],
    },
    options: {
      indexAxis: 'y',
      responsive: true,
      plugins: { legend: { display: false }, tooltip: { callbacks: {
        label: ctx => ` ${ctx.parsed.x} hits`
      }}},
      scales: {
        x: { ticks: { color: '#8891aa' }, grid: { color: '#2e3148' } },
        y: { ticks: { color: '#e2e8f0', font: { size: 12 } }, grid: { display: false } },
      },
    },
  });

  // URLs chart (top 15)
  const urlTop = urls.slice(0, 15);
  const urlLabels = urlTop.map(u => {
    try { return new URL(u.url).hostname.replace(/^www\./, ''); } catch { return u.url; }
  });
  drawChart('urls', 'chart-urls', {
    type: 'bar',
    data: {
      labels: urlLabels,
      datasets: [{
        label: 'Total hits',
        data: urlTop.map(u => u.total),
        backgroundColor: urlTop.map((_, i) => PALETTE[(i + 3) % PALETTE.length] + 'cc'),
        borderColor: urlTop.map((_, i) => PALETTE[(i + 3) % PALETTE.length]),
        borderWidth: 1,
        borderRadius: 4,
      }],
    },
    options: {
      indexAxis: 'y',
      responsive: true,
      plugins: { legend: { display: false }, tooltip: {
        callbacks: {
          title: ctx => urlTop[ctx[0].dataIndex].url,
          label: ctx => ` ${ctx.parsed.x} hits`,
        }
      }},
      scales: {
        x: { ticks: { color: '#8891aa' }, grid: { color: '#2e3148' } },
        y: { ticks: { color: '#e2e8f0', font: { size: 12 } }, grid: { display: false } },
      },
    },
  });

  // Heatmap
  const { urls: hmUrls, keywords: hmKws, matrix } = heatmap;
  const container = document.getElementById('heatmap-container');
  if (!hmUrls.length) {
    container.innerHTML = '<div class="loading">No keyword hits found yet.</div>';
  } else {
    const maxVal = Math.max(...matrix.flat());
    const table = document.createElement('table');
    table.className = 'heatmap';

    // Header row
    const thead = table.createTHead();
    const hRow = thead.insertRow();
    const corner = document.createElement('th');
    corner.textContent = 'URL';
    hRow.appendChild(corner);
    hmKws.forEach(kw => {
      const th = document.createElement('th');
      th.className = 'col-head';
      th.textContent = kw;
      hRow.appendChild(th);
    });

    // Data rows
    const tbody = table.createTBody();
    hmUrls.forEach((url, ri) => {
      const row = tbody.insertRow();
      const urlCell = row.insertCell();
      urlCell.className = 'url-cell';
      try { urlCell.textContent = new URL(url).hostname.replace(/^www\./, ''); } catch { urlCell.textContent = url; }
      urlCell.title = url;

      matrix[ri].forEach(val => {
        const td = row.insertCell();
        td.className = 'count-cell';
        td.style.background = hsl(val, maxVal);
        td.style.color = val > 0 ? '#fff' : 'transparent';
        td.textContent = val > 0 ? val : '·';
      });
    });

    container.innerHTML = '';
    container.appendChild(table);
  }
}

function esc(s) {
  return String(s).replace(/[&<>"']/g, c => (
    {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]
  ));
}

function fmtDate(d) { return d ? new Date(d).toLocaleString() : '—'; }

// Crawl coverage table (feature-independent, so loaded once).
async function loadCoverage() {
  const domains = await fetch('/api/domains').then(r => r.json());
  const container = document.getElementById('coverage-container');
  if (!domains.length) {
    container.innerHTML = '<div class="loading">No pages crawled yet — run the workflow to populate coverage.</div>';
    return;
  }
  const maxPages = Math.max(...domains.map(d => d.pages_crawled));
  const table = document.createElement('table');
  table.className = 'cov-table';
  table.innerHTML = `<thead><tr>
    <th>Domain</th>
    <th class="num">Pages crawled</th>
    <th class="num">Total hits</th>
    <th>Last crawled</th>
  </tr></thead>`;
  const tbody = table.createTBody();
  domains.forEach(d => {
    const tr = tbody.insertRow();
    tr.title = 'Click to see crawled pages';
    const pct = maxPages ? (d.pages_crawled / maxPages) * 100 : 0;
    const failed = d.pages_crawled - d.pages_ok;
    tr.innerHTML = `
      <td><span class="cov-domain">${esc(d.domain)}</span></td>
      <td class="num">
        <div class="cov-bar-wrap" style="justify-content:flex-end">
          <span>${d.pages_crawled}${failed ? ` <span class="status-err">(${failed} failed)</span>` : ''}</span>
          <span class="cov-bar" style="width:${Math.max(pct, 4)}px"></span>
        </div>
      </td>
      <td class="num">${d.total_hits}</td>
      <td>${fmtDate(d.last_crawled)}</td>`;
    tr.onclick = () => openDomainModal(d.domain);
  });
  container.innerHTML = '';
  container.appendChild(table);
  const caption = document.createElement('div');
  caption.className = 'cov-caption';
  caption.textContent = 'Coverage counts every page crawled (all features). Click a domain to see its pages.';
  container.appendChild(caption);
}

// Domain detail modal: pages grouped by host (subdomain).
async function openDomainModal(domain) {
  document.getElementById('dm-title').textContent = domain;
  document.getElementById('dm-sub').textContent = '';
  document.getElementById('dm-body').innerHTML = '<div class="loading">Loading…</div>';
  document.getElementById('domain-modal').classList.add('open');

  const pages = await fetch(`/api/domains/${encodeURIComponent(domain)}/pages`).then(r => r.json());
  const body = document.getElementById('dm-body');
  if (!pages.length) {
    body.innerHTML = '<div class="loading">No pages recorded for this domain.</div>';
    return;
  }

  // Group by host so subdomains are visually separated.
  const groups = {};
  pages.forEach(p => {
    let host = p.url;
    try { host = new URL(p.url).host; } catch {}
    (groups[host] ||= []).push(p);
  });

  const totalHits = pages.reduce((s, p) => s + Number(p.hits || 0), 0);
  document.getElementById('dm-sub').textContent =
    `${pages.length} page${pages.length === 1 ? '' : 's'} across ${Object.keys(groups).length} host${Object.keys(groups).length === 1 ? '' : 's'} · ${totalHits} total hits`;

  body.innerHTML = '';
  Object.keys(groups).sort().forEach(host => {
    const wrap = document.createElement('div');
    wrap.className = 'host-group';
    const rows = groups[host].map(p => {
      let path = p.url;
      try { const u = new URL(p.url); path = (u.pathname || '/') + u.search; } catch {}
      const status = p.ok
        ? `<span class="status-ok">${p.status_code || 'ok'}</span>`
        : `<span class="status-err">${p.status_code || 'error'}</span>`;
      return `<tr>
        <td><a href="${esc(p.url)}" target="_blank" rel="noopener">${esc(path)}</a></td>
        <td class="num">${p.hits}</td>
        <td>${status}</td>
        <td>${fmtDate(p.crawled_at)}</td>
      </tr>`;
    }).join('');
    wrap.innerHTML = `
      <div class="host-title">${esc(host)}</div>
      <table class="pages">
        <thead><tr><th>Path</th><th class="num">Hits</th><th>Status</th><th>Crawled</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
    body.appendChild(wrap);
  });
}

function closeDomainModal() {
  document.getElementById('domain-modal').classList.remove('open');
}
document.getElementById('domain-modal').addEventListener('click', e => {
  if (e.target.id === 'domain-modal') closeDomainModal();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDomainModal(); });

document.getElementById('feature-filter').addEventListener('change', () => {
  load().catch(err => console.error('Dashboard reload error:', err));
});

loadFeatureOptions()
  .then(() => load())
  .catch(err => console.error('Dashboard load error:', err));
loadCoverage().catch(err => console.error('Coverage load error:', err));
</script>
</body>
</html>
